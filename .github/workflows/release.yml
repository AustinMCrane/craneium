name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install mdbuild
        run: go install github.com/austinmcrane/mdbuild@latest

      - name: Create SOUL.md from example
        run: cp SOUL.example.md SOUL.md

      - name: Build
        run: make build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/craneium.agent.md
